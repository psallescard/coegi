<div class="h-full flex flex-col">
    <!-- Branding -->
    <div class="p-6 flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-blue-200">
            C
        </div>
        <h1 class="text-xl font-bold tracking-tight text-slate-800 lg:block">Coesi</h1>
    </div>

    <!-- Main Navigation -->
    <nav class="flex-1 px-4 space-y-1">
        <a href="/"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all {% if request.path == '/' %}bg-blue-50 text-blue-600{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
            <svg class="w-5 h-5 {% if request.path == '/' %}text-blue-600{% else %}text-slate-400{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span class="text-sm font-semibold">Workspace</span>
        </a>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
            <span class="text-sm font-semibold">Chat</span>
        </a>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span class="text-sm font-semibold">Performance</span>
        </a>

        <!-- Projects Section -->
        <div class="pt-6 pb-2 px-3">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Projects</p>
        </div>
        <div hx-get="{% url 'projects:projects_list' %}"
             hx-trigger="load"
             hx-swap="outerHTML">
            <!-- Loader -->
            <div class="pt-6 px-3 animate-pulse space-y-3">
                <div class="h-2 w-12 bg-slate-100 rounded"></div>
                <div class="h-4 w-full bg-slate-100 rounded-xl"></div>
                <div class="h-4 w-full bg-slate-100 rounded-xl"></div>
            </div>
        </div>


    </nav>

    <!-- User Profile (Bottom) -->
    <div class="p-4 border-t border-slate-100">
        <div class="flex items-center gap-3 p-2 rounded-2xl hover:bg-slate-50 cursor-pointer transition-colors group">
            <div class="w-10 h-10 rounded-full bg-linear-to-tr from-slate-200 to-slate-100 flex items-center justify-center border border-slate-200 shadow-sm">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <div class="overflow-hidden">
                <p class="text-sm font-bold text-slate-800 truncate">{{ user.username|default:"Visitante" }}</p>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Plano Pro</p>
            </div>
        </div>
    </div>
</div>
