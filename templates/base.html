{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Coesi{% endblock %}</title>

  <!-- Include css modules -->
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">

  <!-- Include js modules -->
  <script defer src="{% static 'js/htmx.min.js' %}"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden"
      x-data="{ sidebarOpen: false }"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    <!-- Mobile Overlay -->
    <div
        x-show="sidebarOpen"
        @click="sidebarOpen = false"
        class="fixed inset-0 z-40 bg-slate-900/50 backdrop-blur-sm lg:hidden"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0">
    </div>

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside
            :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
            class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0">
            {% include 'includes/_sidebar.html' %}
        </aside>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col min-w-0">

            <!-- NAVBAR -->
            <header class="sticky top-0 z-30 h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = true" class="p-2 rounded-lg hover:bg-slate-100 lg:hidden focus:outline-none">
                        <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                    </button>

                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">
                        {% block navbar_title %}Início{% endblock %}
                    </h2>
                </div>

                {% include 'includes/_navbar_actions.html' %}
            </header>

            <!-- PAGE CONTENT -->
            <main class="flex-1 p-4 md:p-8">
                {% block content %}{% endblock %}
            </main>

        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
