{% for project in projects %}
<a href="#"
   class="flex items-center justify-between gap-3 px-3 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition-all group">
    <span class="truncate font-medium">{{ project.name }}</span>
    {% if project.is_pinned %}
    <svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 -960 960 960" width="24px" fill="#45556c" class="shrink-0"><path d="m640-480 80 80v80H520v240l-40 40-40-40v-240H240v-80l80-80v-280h-40v-80h400v80h-40v280Zm-286 80h252l-46-46v-314H400v314l-46 46Zm126 0Z"/></svg>
    {% endif %}
</a>
{% empty %}
<p class="px-3 text-xs text-slate-400 italic">No projects found.</p>
{% endfor %}

{% if next_page %}
<!-- Infinite scroll -->
<div id="replace-me-with-next-page"
     hx-get="{% url 'projects:projects_list' %}?page={{ next_page }}"
     hx-trigger="intersect once"
     hx-indicator="#infinite-scroll-loader"
     hx-target="#replace-me-with-next-page"
     hx-swap="outerHTML"
     class="flex items-center justify-center p-4">

    <!-- Subtle loader -->
    <div class="flex items-center text-slate-400">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>
</div>
{% endif %}
